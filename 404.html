<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LearningTandS</title>
  <!--
    GitHub Pages SPA fallback.
    Any unknown path (e.g. /LMSFontend/course-manager?category=...) lands here.
    We encode the path into a query string and bounce to the app root, where
    index.html decodes it back into the real route before Angular boots.
    pathSegmentsToKeep = 1 keeps the project base segment ("/LMSFontend/").
    See https://github.com/rafgraph/spa-github-pages
  -->
  <script>
    (function () {
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }());
  </script>
</head>
<body></body>
</html>
