<main class="certificates-page">
	<header class="cert-header">
		<h1>My Certificates</h1>
		<p>তুমি যেসব কোর্সে সফলভাবে পাশ করেছো, সেগুলোর certificate এখানে থাকবে।</p>
	</header>

	<section class="cert-list">
		<!-- Demo certificate card, later will be looped -->
		<article class="cert-card">
			<div class="cert-icon">🎓</div>
			<div class="cert-info">
				<h2>Angular Basics</h2>
				<p>Completion Date: ২০২৬-০৪-২৭</p>
				<span class="cert-id">Certificate ID: DEMO12345</span>
			</div>
			<button class="cert-btn" disabled>Download</button>
		</article>

		<!-- Empty state -->
		<div class="cert-empty">
			<h3>কোনো certificate পাওয়া যায়নি</h3>
			<p>কোর্স শেষ করলে এখানে certificate দেখতে পাবে।</p>
		</div>
	</section>
</main>
