<main class="assignment-page">
	<app-navbar></app-navbar>
	<header class="assign-header">
		<h1>{{ lang.t().asgTitle }}</h1>
		<p>{{ lang.t().asgSub }}</p>
	</header>

	<section class="assign-list">
		<!-- Demo assignment card, later will be looped -->
		<article class="assign-card">
			<div class="assign-icon">📝</div>
			<div class="assign-info">
				<h2>Module 1: HTML Basics</h2>
				<p>{{ lang.t().asgDue }} ৩০ এপ্রিল ২০২৬</p>
				<span class="assign-status">{{ lang.t().asgStatus }} {{ lang.t().asgPending }}</span>
			</div>
			<button class="assign-btn" disabled>{{ lang.t().asgSubmit }}</button>
		</article>

		<!-- Empty state -->
		<div class="assign-empty">
			<h3>{{ lang.t().asgEmpty }}</h3>
			<p>{{ lang.t().asgEmptyDesc }}</p>
		</div>
	</section>
</main>
