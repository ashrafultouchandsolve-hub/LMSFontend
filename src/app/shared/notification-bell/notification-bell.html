@if (authSvc.isLoggedIn()) {
  <div class="notif-wrap">

    <!-- Bell Button -->
    <button class="notif-bell" (click)="toggle()" [class.open]="isOpen()" aria-label="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      @if (unreadCount() > 0) {
        <span class="notif-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
      }
    </button>

    <!-- Dropdown -->
    @if (isOpen()) {
      <div class="notif-dropdown">

        <!-- Header -->
        <div class="notif-header">
          <span class="notif-header-title">{{ lang.t().nbTitle }}</span>
          @if (unreadCount() > 0) {
            <button class="notif-read-all" (click)="markAllRead()">{{ lang.t().nbMarkAll }}</button>
          }
        </div>

        <!-- List -->
        <div class="notif-list">
          @for (n of notifications(); track n.id) {
            <div
              class="notif-item"
              [class.unread]="!n.isRead"
              (click)="clickNotification(n)">
              <div class="notif-item-icon">{{ getIcon(n.type) }}</div>
              <div class="notif-item-body">
                <div class="notif-item-title">{{ n.title }}</div>
                <div class="notif-item-msg">{{ n.message }}</div>
                <div class="notif-item-time">{{ timeAgo(n.createdAt) }}</div>
              </div>
              @if (!n.isRead) {
                <div class="notif-dot"></div>
              }
            </div>
          }
          @empty {
            <div class="notif-empty">
              <span>🔔</span>
              <p>{{ lang.t().nbEmpty }}</p>
            </div>
          }
        </div>

      </div>
    }

  </div>
}
