<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LearningTandS</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <!--
    GitHub Pages SPA support: 404.html redirects deep links to "/?/real/path".
    This restores the real URL before Angular boots so refresh/direct links work.
    See https://github.com/rafgraph/spa-github-pages
  -->
  <script>
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location));
  </script>
  <script src="https://meet.jit.si/external_api.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script></head>
<body>
  <app-root></app-root>
</body>
</html>
